    <nav class="page-nav">
      <span class="page-nav__name">Scheduler</span>
      <span class="page-nav__sep">·</span>

    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect, useRef } = React;

      /* ====================================================
       Scheduler component (inlined — no build step needed)
       ==================================================== */

      const EV_W = 100; // px per hour — keep in sync with .sched__ev width

      const HOURS = [
        "12 am",
        "1 am",
        "2 am",
        "3 am",
        "4 am",
        "5 am",
        "6 am",
        "7 am",
        "8 am",
        "9 am",
        "10 am",
        "11 am",
        "12 pm",
        "1 pm",
        "2 pm",
        "3 pm",
        "4 pm",
        "5 pm",
        "6 pm",
        "7 pm",
        "8 pm",
        "9 pm",
        "10 pm",
        "11 pm",
      ];

      function sameDay(a, b) {
        return (
          a.getDate() === b.getDate() &&
          a.getMonth() === b.getMonth() &&
          a.getFullYear() === b.getFullYear()
        );
      }
      function addHours(d, n) {
        return new Date(d.getTime() + n * 3_600_000);
      }
      function datesOverlap(s1, e1, s2, e2) {
        return s1 <= e2 && s2 <= e1;
      }

      function fmtHeader(d) {
        return new Intl.DateTimeFormat("en-US", {
          month: "short",
          day: "2-digit",
          year: "numeric",
        }).format(d);
      }
      function fmtTooltip(ev) {
        return `${ev.name} — ${new Intl.DateTimeFormat("en-US", {
          hour: "numeric",
          minute: "2-digit",
          hour12: true,
          month: "short",
          day: "2-digit",
          year: "numeric",
        }).format(ev.date)}`;
      }
      function nowPos(sel) {
        const now = new Date();
        return sameDay(sel, now)
          ? now.getHours() * EV_W + (now.getMinutes() * EV_W) / 60
          : -10;
      }
      function buildGrid(events, sel) {
        const grid = [[]];
        events
          .filter(({ date }) => date && sameDay(new Date(date), sel))
          .forEach((ev, idx) => {
            const d = new Date(ev.date);
            const edge = addHours(d, 1);
            const item = {
              position: d.getHours() * EV_W + (d.getMinutes() * EV_W) / 60,
              name: ev.name,
              date: d,
            };
            if (idx === 0) {
              grid[0].push(item);
              return;
            }
            for (let i = 0; i < grid.length; i++) {
              let clash = false;
              for (const ex of grid[i]) {
                if (datesOverlap(d, edge, ex.date, addHours(ex.date, 1))) {
                  clash = true;
                  break;
                }
              }
              if (clash) {
                if (grid[i + 1] !== undefined) continue;
                grid.push([]);
                grid[i + 1].push(item);
                break;
              } else {
                grid[i].push(item);
                break;
              }
            }
          });
        return grid;
      }

      function Scheduler({ events = [], onDateChange }) {
        const [sel, setSel] = useState(() => new Date());
        const [grid, setGrid] = useState(() => buildGrid(events, new Date()));
        const [marker, setMarker] = useState(() => nowPos(new Date()));
        const ref = useRef(null);

        useEffect(() => {
          setGrid(buildGrid(events, sel));
        }, [events, sel]);
        useEffect(() => {
          setMarker(nowPos(sel));
        }, [sel]);
        useEffect(() => {
          const reduced = window.matchMedia(
            "(prefers-reduced-motion: reduce)",
          ).matches;
          ref.current?.scrollIntoView({
            inline: "center",
            block: "nearest",
            behavior: reduced ? "auto" : "smooth",
          });
        }, [marker]);

        function goDay(delta) {
          const d = new Date(sel);
          d.setDate(d.getDate() + delta);
          setSel(d);
          onDateChange?.(d);
        }

        return (
          <div>
            <div className="sched__hdr">
              <span className="sched__date">{fmtHeader(sel)}</span>
              <button
                className="sched__nav"
                onClick={() => goDay(-1)}
                aria-label="Previous day"
              >
                &lt;
              </button>
              <button
                className="sched__nav"
                onClick={() => goDay(1)}
                aria-label="Next day"
              >
                &gt;
              </button>
            </div>
            <div className="sched__box">
              <div className="sched__tl">
                {HOURS.map((h) => (
                  <div key={h} className="sched__hr">
                    {h}
                  </div>
                ))}
              </div>
              <div className="sched__evs">
                {grid.map((row, i) => (
                  <div key={i} className="sched__row">
                    {row.map((ev) => (
                      <div
                        key={ev.date.toString()}
                        className="sched__ev"
                        style={{ left: ev.position + "px" }}
                        title={fmtTooltip(ev)}
                      >
                        {ev.name}
                      </div>
                    ))}
                  </div>
                ))}
              </div>
              <div
                ref={ref}
                className="sched__now"
                style={{ left: marker + "px" }}
                aria-hidden="true"
              />
            </div>
          </div>
        );
      }

      /* ====================================================
       Demo app
       ==================================================== */

      function todayAt(h, m = 0) {
        const d = new Date();
        d.setHours(h, m, 0, 0);
        return d;
      }

      const SEED_EVENTS = [
        { id: 1, name: "Stand-up", date: todayAt(9, 0) },
        { id: 2, name: "Design review", date: todayAt(10, 30) },
        { id: 3, name: "Lunch", date: todayAt(12, 0) },
        { id: 4, name: "1:1 with Alex", date: todayAt(14, 0) },
        { id: 5, name: "Sprint planning", date: todayAt(14, 30) }, // overlaps → row 2
        { id: 6, name: "Code review", date: todayAt(16, 0) },
      ];

      // Plain text for clipboard copy
      const CODE_PLAIN = `import Scheduler from './Scheduler';

const events = [
  { name: 'Stand-up',      date: new Date(2026, 6, 6, 9,  0) },
  { name: 'Design review', date: new Date(2026, 6, 6, 10, 30) },
  { name: 'Lunch',         date: new Date(2026, 6, 6, 12,  0) },
];

export default function App() {
  return (
    <Scheduler
      events={events}
      onDateChange={(date) => console.log('Selected:', date)}
    />
  );
}`;

      // HTML for syntax-highlighted display (entities for < > inside JSX tags)
      const CODE_HTML = `<span class="kw">import</span> Scheduler <span class="kw">from</span> <span class="str">'./Scheduler'</span>;

<span class="kw">const</span> events = [
  { name: <span class="str">'Stand-up'</span>,      date: <span class="kw">new</span> <span class="fn_">Date</span>(<span class="num">2026</span>, <span class="num">6</span>, <span class="num">6</span>, <span class="num">9</span>,  <span class="num">0</span>) },
  { name: <span class="str">'Design review'</span>, date: <span class="kw">new</span> <span class="fn_">Date</span>(<span class="num">2026</span>, <span class="num">6</span>, <span class="num">6</span>, <span class="num">10</span>, <span class="num">30</span>) },
  { name: <span class="str">'Lunch'</span>,         date: <span class="kw">new</span> <span class="fn_">Date</span>(<span class="num">2026</span>, <span class="num">6</span>, <span class="num">6</span>, <span class="num">12</span>,  <span class="num">0</span>) },
];

<span class="kw">export default function</span> <span class="fn_">App</span>() {
  <span class="kw">return</span> (
    <span class="tg">&lt;Scheduler</span>
      <span class="pr">events</span>={events}
      <span class="pr">onDateChange</span>={(date) =&gt; console.<span class="fn_">log</span>(<span class="str">'Selected:'</span>, date)}
    <span class="tg">/&gt;</span>
  );
}`;

      function fmtTime(d) {
        return new Intl.DateTimeFormat("en-US", {
          hour: "numeric",
          minute: "2-digit",
          hour12: true,
        }).format(d);
      }

      function App() {
        const [events, setEvents] = useState(SEED_EVENTS);
        const [name, setName] = useState("");
        const [time, setTime] = useState("09:00");
        const [uid, setUid] = useState(100);
        const [copied, setCopied] = useState(false);

        const todayEvents = events
          .filter(({ date }) => sameDay(date, new Date()))
          .sort((a, b) => a.date - b.date);

        function addEvent() {
          const trimmed = name.trim();
          if (!trimmed) return;
          const [h, m] = time.split(":").map(Number);
          setEvents((prev) => [
            ...prev,
            { id: uid, name: trimmed, date: todayAt(h, m) },
          ]);
          setUid((n) => n + 1);
          setName("");
        }

        function removeEvent(id) {
          setEvents((prev) => prev.filter((e) => e.id !== id));
        }

        function copyCode() {
          navigator.clipboard?.writeText(CODE_PLAIN).then(() => {
            setCopied(true);
            setTimeout(() => setCopied(false), 2000);
          });
        }

        return (
          <main className="page-main">
            {/* ── Hero ── */}
            <div className="hero">
              <p className="hero__eyebrow">React Component</p>
              <h1 className="hero__h1">
                View <em>Day Schedule</em>
              </h1>
              <p className="hero__body">
                A horizontal timeline for displaying daily events. Handles
                overlapping events, a live "now" marker, and day navigation — no
                dependencies beyond React.
              </p>
            </div>

            {/* ── Live demo ── */}
            <section>
              <div className="sec__ey">
                <span className="sec__label">Live demo</span>
                <div className="sec__rule" />
              </div>
              <p className="sec__sub">
                Running with real events for today. The indigo line marks the
                current time. Navigate with the arrows, or add your own events
                below.
              </p>
              <div className="card">
                <Scheduler events={events} />
              </div>
            </section>

            {/* ── Try it ── */}
            <section>
              <div className="sec__ey">
                <span className="sec__label">Try it</span>
                <div className="sec__rule" />
              </div>
              <p className="sec__sub">
                Add events and watch the scheduler update live. Try adding two
                events at overlapping times.
              </p>

              <div className="try-grid">
                {/* Form */}
                <div className="card">
                  <div className="fg">
                    <label className="fl" htmlFor="ev-name">
                      Event name
                    </label>
                    <input
                      id="ev-name"
                      className="fi"
                      type="text"
                      placeholder="e.g. Team sync"
                      value={name}
                      onChange={(e) => setName(e.target.value)}
                      onKeyDown={(e) => e.key === "Enter" && addEvent()}
                    />
                  </div>
                  <div className="fg">
                    <label className="fl" htmlFor="ev-time">
                      Time (today)
                    </label>
                    <input
                      id="ev-time"
                      className="fi"
                      type="time"
                      value={time}
                      onChange={(e) => setTime(e.target.value)}
                    />
                  </div>
                  <button className="btn-add" onClick={addEvent}>
                    + Add event
                  </button>
                </div>

                {/* Event list */}
                <div className="card">
                  {todayEvents.length === 0 ? (
                    <div className="ev-empty">
                      No events today — add one on the left!
                    </div>
                  ) : (
                    <div className="ev-list">
                      {todayEvents.map((ev) => (
                        <div key={ev.id} className="ev-item">
                          <div className="ev-dot" />
                          <div className="ev-info">
                            <div className="ev-name">{ev.name}</div>
                            <div className="ev-time">{fmtTime(ev.date)}</div>
                          </div>
                          <button
                            className="ev-del"
                            aria-label={`Remove ${ev.name}`}
                            onClick={() => removeEvent(ev.id)}
                          >
                            ✕
                          </button>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            </section>

            {/* ── Usage ── */}
            <section>
              <div className="sec__ey">
                <span className="sec__label">Usage</span>
                <div className="sec__rule" />
              </div>

              <div className="codeblock">
                <div className="codeblock__hd">
                  <span className="codeblock__fn">App.jsx</span>
                  <button
                    className={`codeblock__cp${copied ? " ok" : ""}`}
                    onClick={copyCode}
                  >
                    {copied ? "✓ Copied" : "Copy"}
                  </button>
                </div>
                <pre dangerouslySetInnerHTML={{ __html: CODE_HTML }} />
              </div>
            </section>

            {/* ── Props ── */}
            <section>
              <div className="sec__ey">
                <span className="sec__label">Props</span>
                <div className="sec__rule" />
              </div>

              <div className="card pt-wrap" style={{ padding: 0 }}>
                <table className="pt">
                  <thead>
                    <tr>
                      <th>Prop</th>
                      <th>Type</th>
                      <th></th>
                      <th>Description</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr>
                      <td>
                        <span className="p-name">events</span>
                      </td>
                      <td>
                        <span className="p-type">Array&lt;Event&gt;</span>
                      </td>
                      <td>
                        <span className="badge-req">required</span>
                      </td>
                      <td className="p-desc">
                        Array of event objects, each with a{" "}
                        <code>name: string</code> and a <code>date: Date</code>.
                        Events on other days are automatically filtered out.
                      </td>
                    </tr>
                    <tr>
                      <td>
                        <span className="p-name">onDateChange</span>
                      </td>
                      <td>
                        <span className="p-type">(date: Date) =&gt; void</span>
                      </td>
                      <td>
                        <span className="badge-opt">optional</span>
                      </td>
                      <td className="p-desc">
                        Called when the user navigates to a different day using
                        the arrow buttons. Receives the newly selected{" "}
                        <code>Date</code>.
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </section>
          </main>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
